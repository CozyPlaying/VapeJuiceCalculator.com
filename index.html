<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#e8ff47">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MIXLAB">
<title>MIXLAB</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a; --surface: #111; --card: #161616; --border: #2a2a2a;
    --accent: #e8ff47; --accent2: #ff6b35; --purple: #9b59b6;
    --vg: #27ae60; --pg: #2980b9; --text: #f0f0f0; --muted: #666; --dim: #333;
    --safe-top: env(safe-area-inset-top, 0px); --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { height:100%; overscroll-behavior:none; }
  body {
    background:var(--bg); color:var(--text); font-family:'Barlow Condensed',sans-serif;
    padding-top:var(--safe-top); padding-bottom:calc(60px + var(--safe-bottom));
    background-image:
      repeating-linear-gradient(0deg,transparent,transparent 40px,rgba(255,255,255,0.012) 40px,rgba(255,255,255,0.012) 41px),
      repeating-linear-gradient(90deg,transparent,transparent 40px,rgba(255,255,255,0.012) 40px,rgba(255,255,255,0.012) 41px);
  }
  .app-header {
    position:sticky; top:0; z-index:100; background:rgba(10,10,10,0.95); backdrop-filter:blur(10px);
    border-bottom:1px solid var(--border); padding:12px 16px; display:flex; align-items:center; justify-content:space-between;
  }
  .logo { font-size:28px; font-weight:900; letter-spacing:6px; color:var(--accent); text-shadow:0 0 20px rgba(232,255,71,0.3); }
  .logo span { color:var(--text); }
  .header-actions { display:flex; gap:8px; }
  .icon-btn {
    background:transparent; border:1px solid var(--dim); color:var(--muted);
    font-size:16px; width:36px; height:36px; display:flex; align-items:center; justify-content:center;
    cursor:pointer; border-radius:2px;
  }
  .icon-btn:active { background:var(--dim); }
  .tab-bar { display:flex; border-bottom:1px solid var(--border); background:var(--surface); position:sticky; top:57px; z-index:99; }
  .tab {
    flex:1; padding:12px 8px; text-align:center; font-size:11px; font-weight:700; letter-spacing:2px; text-transform:uppercase;
    color:var(--muted); cursor:pointer; border-bottom:2px solid transparent; transition:all 0.2s;
  }
  .tab.active { color:var(--accent); border-bottom-color:var(--accent); }
  .page { display:none; padding:12px 12px 20px; }
  .page.active { display:block; }
  .target-bar { background:var(--card); border:1px solid var(--border); border-left:3px solid var(--accent); padding:12px 16px; margin-bottom:10px; }
  .target-row { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
  .target-lbl { font-size:11px; font-weight:700; letter-spacing:3px; color:var(--accent); }
  .target-input {
    background:var(--bg); border:1px solid var(--dim); color:var(--accent);
    font-family:'Share Tech Mono',monospace; font-size:28px; width:100px; padding:6px 10px; text-align:center; outline:none;
  }
  .target-input:focus { border-color:var(--accent); }
  .ml-lbl { font-size:16px; color:var(--muted); }
  .quick-btns { display:flex; gap:6px; flex-wrap:wrap; }
  .qbtn {
    background:transparent; border:1px solid var(--dim); color:var(--muted);
    font-family:'Barlow Condensed',sans-serif; font-size:13px; font-weight:700;
    letter-spacing:1px; padding:7px 14px; cursor:pointer; transition:all 0.15s;
  }
  .qbtn:active,.qbtn.active { border-color:var(--accent); color:var(--accent); background:rgba(232,255,71,0.08); }
  .ratio-card { background:var(--card); border:1px solid var(--border); border-left:3px solid var(--vg); padding:14px 16px; margin-bottom:10px; }
  .ratio-top { display:flex; align-items:center; gap:12px; margin-bottom:12px; flex-wrap:wrap; }
  .ratio-lbl { font-size:11px; font-weight:700; letter-spacing:3px; color:var(--muted); }
  .ratio-inputs { display:flex; align-items:center; gap:6px; }
  .ratio-num { background:var(--bg); border:1px solid var(--dim); font-family:'Share Tech Mono',monospace; font-size:24px; width:60px; padding:6px 8px; text-align:center; outline:none; }
  #vgRatio { color:var(--vg); } #vgRatio:focus { border-color:var(--vg); }
  #pgRatio { color:var(--pg); } #pgRatio:focus { border-color:var(--pg); }
  .ratio-sep { font-size:20px; color:var(--dim); font-family:'Share Tech Mono',monospace; }
  .ratio-tag { font-size:11px; letter-spacing:2px; color:var(--muted); }
  .ratio-results { display:grid; grid-template-columns:1fr 1fr; gap:6px; }
  .rrbox { padding:10px 12px; border:1px solid var(--border); }
  .rrbox.vg { border-left:2px solid var(--vg); }
  .rrbox.pg { border-left:2px solid var(--pg); }
  .rrbox-lbl { font-size:9px; letter-spacing:3px; color:var(--muted); text-transform:uppercase; margin-bottom:2px; }
  .rrbox-val { font-family:'Share Tech Mono',monospace; font-size:22px; line-height:1; }
  .rrbox-val.vg { color:var(--vg); } .rrbox-val.pg { color:var(--pg); }
  .rrbox-sub { font-family:'Share Tech Mono',monospace; font-size:9px; color:var(--dim); margin-top:3px; }
  .section-hdr { display:flex; align-items:center; justify-content:space-between; margin:14px 0 7px; }
  .section-lbl { font-size:10px; font-weight:700; letter-spacing:4px; color:var(--muted); text-transform:uppercase; }
  .col-hdrs { display:grid; grid-template-columns:1fr 60px 72px 44px 38px; margin-bottom:4px; }
  .col-h { font-size:9px; letter-spacing:2px; color:var(--dim); text-transform:uppercase; padding:0 8px; }
  .col-h.r { text-align:right; padding-right:8px; } .col-h.c { text-align:center; padding:0 2px; }
  .ing-row {
    background:var(--card); border:1px solid var(--border);
    display:grid; grid-template-columns:1fr 60px 72px 44px 38px;
    margin-bottom:3px; animation:slideIn 0.2s ease;
  }
  @keyframes slideIn { from{opacity:0;transform:translateX(-8px)} to{opacity:1;transform:none} }
  .ing-name {
    background:transparent; border:none; border-right:1px solid var(--border);
    color:var(--text); font-family:'Barlow Condensed',sans-serif; font-size:15px; padding:10px 12px; outline:none; width:100%;
  }
  .ing-name::placeholder { color:var(--dim); }
  .ing-pct {
    background:transparent; border:none; border-right:1px solid var(--border);
    color:var(--accent2); font-family:'Share Tech Mono',monospace; font-size:14px; padding:10px 6px; outline:none; width:100%; text-align:right;
  }
  .ing-ml {
    border-right:1px solid var(--border); color:var(--accent); font-family:'Share Tech Mono',monospace;
    font-size:13px; padding:10px 8px; text-align:right; display:flex; align-items:center; justify-content:flex-end;
  }
  .ing-vgpg {
    display:flex; flex-direction:column; border-right:1px solid var(--border); cursor:pointer; overflow:hidden; user-select:none;
  }
  .vgpg-half {
    flex:1; display:flex; align-items:center; justify-content:center;
    font-family:'Share Tech Mono',monospace; font-size:9px; letter-spacing:1px; color:var(--dim); transition:all 0.15s;
  }
  .vgpg-half.sel-vg { background:rgba(39,174,96,0.2); color:var(--vg); font-weight:700; }
  .vgpg-half.sel-pg { background:rgba(41,128,185,0.2); color:var(--pg); font-weight:700; }
  .ing-del { background:transparent; border:none; color:var(--dim); font-size:20px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
  .ing-del:active { color:#ff4444; }
  .add-btn {
    width:100%; background:transparent; border:1px dashed var(--dim); color:var(--muted);
    font-family:'Barlow Condensed',sans-serif; font-size:13px; font-weight:700;
    letter-spacing:3px; text-transform:uppercase; padding:12px; cursor:pointer; margin-top:6px;
  }
  .add-btn:active { border-color:var(--accent); color:var(--accent); }
  .nic-card { background:var(--card); border:1px solid var(--border); border-left:2px solid var(--purple); padding:14px; margin-top:4px; }
  .nic-base-row { display:flex; align-items:center; gap:10px; margin-bottom:12px; flex-wrap:wrap; }
  .nic-base-lbl { font-size:9px; letter-spacing:3px; color:var(--muted); text-transform:uppercase; }
  .nic-base-btns { display:flex; }
  .nbb { background:transparent; border:1px solid var(--dim); color:var(--muted); font-family:'Share Tech Mono',monospace; font-size:11px; padding:5px 14px; cursor:pointer; margin-left:-1px; transition:all 0.15s; }
  .nbb.sel-vg { background:rgba(39,174,96,0.18); color:var(--vg); border-color:var(--vg); z-index:1; position:relative; }
  .nbb.sel-pg { background:rgba(41,128,185,0.18); color:var(--pg); border-color:var(--pg); z-index:1; position:relative; }
  .nbb.sel-5050 { background:rgba(155,89,182,0.18); color:var(--purple); border-color:var(--purple); z-index:1; position:relative; }
  .nic-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:10px; }
  .nic-field label { display:block; font-size:9px; letter-spacing:3px; color:var(--muted); margin-bottom:5px; text-transform:uppercase; }
  .nic-field input { background:var(--bg); border:1px solid var(--dim); color:#c39bd3; font-family:'Share Tech Mono',monospace; font-size:22px; padding:7px 10px; outline:none; width:100%; }
  .nic-field input:focus { border-color:var(--purple); }
  .nic-unit { font-size:9px; color:var(--dim); margin-top:3px; letter-spacing:1px; }
  .nic-result-row { display:flex; align-items:center; justify-content:space-between; padding-top:8px; border-top:1px solid var(--border); }
  .nic-res-lbl { font-size:10px; letter-spacing:3px; color:var(--muted); text-transform:uppercase; }
  .nic-res-val { font-family:'Share Tech Mono',monospace; font-size:24px; color:var(--purple); }
  .totals-card { background:var(--surface); border:1px solid var(--border); border-top:2px solid var(--accent); padding:14px 16px; margin-top:16px; }
  .totals-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
  .tot-item { text-align:center; }
  .tot-val { font-family:'Share Tech Mono',monospace; font-size:26px; color:var(--accent); line-height:1; }
  .tot-val.over { color:#ff4444; } .tot-val.close { color:var(--accent2); }
  .tot-lbl { font-size:9px; letter-spacing:2px; color:var(--muted); margin-top:3px; text-transform:uppercase; }
  /* segmented progress bar */
  .fill-track { height:8px; background:var(--dim); display:flex; margin-bottom:6px; overflow:hidden; }
  .fill-seg { height:100%; transition:width 0.3s; }
  .fill-seg.flav { background:var(--accent2); }
  .fill-seg.nic  { background:var(--purple); }
  .fill-seg.vg   { background:var(--vg); }
  .fill-seg.pg   { background:var(--pg); }
  .fill-legend { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:10px; }
  .fill-leg-item { display:flex; align-items:center; gap:4px; font-family:'Share Tech Mono',monospace; font-size:9px; color:var(--muted); }
  .fill-leg-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
  .totals-bottom { border-top:1px solid var(--border); padding-top:10px; display:flex; justify-content:space-between; align-items:center; }
  .tot-ml { font-family:'Share Tech Mono',monospace; font-size:20px; color:var(--accent); }
  .recipe-search { background:var(--card); border:1px solid var(--border); color:var(--text); font-family:'Barlow Condensed',sans-serif; font-size:16px; padding:10px 14px; width:100%; outline:none; margin-bottom:10px; }
  .recipe-search::placeholder { color:var(--dim); }
  .recipe-search:focus { border-color:var(--accent); }
  .recipe-card { background:var(--card); border:1px solid var(--border); padding:12px 14px; margin-bottom:6px; cursor:pointer; transition:border-color 0.15s; position:relative; }
  .recipe-card:active { border-color:var(--accent); }
  .recipe-name { font-size:17px; font-weight:700; letter-spacing:2px; margin-bottom:3px; padding-right:32px; }
  .recipe-meta { font-family:'Share Tech Mono',monospace; font-size:10px; color:var(--muted); }
  .recipe-del { position:absolute; top:10px; right:10px; background:transparent; border:none; color:var(--dim); font-size:18px; cursor:pointer; padding:4px 8px; }
  .recipe-del:active { color:#ff4444; }
  .empty-state { text-align:center; padding:40px 20px; color:var(--muted); }
  .empty-icon { font-size:40px; margin-bottom:12px; }
  .empty-txt { font-size:12px; letter-spacing:3px; text-transform:uppercase; }
  .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:200; align-items:center; justify-content:center; padding:20px; }
  .modal-overlay.open { display:flex; }
  .modal { background:var(--card); border:1px solid var(--border); border-top:2px solid var(--accent); padding:24px; width:100%; max-width:360px; }
  .modal-title { font-size:16px; font-weight:700; letter-spacing:3px; color:var(--accent); margin-bottom:16px; text-transform:uppercase; }
  .modal-input { background:var(--bg); border:1px solid var(--dim); color:var(--text); font-family:'Barlow Condensed',sans-serif; font-size:20px; padding:10px 14px; width:100%; outline:none; margin-bottom:16px; }
  .modal-input:focus { border-color:var(--accent); }
  .modal-btns { display:flex; gap:8px; }
  .modal-btn { flex:1; font-family:'Barlow Condensed',sans-serif; font-size:13px; font-weight:700; letter-spacing:3px; text-transform:uppercase; padding:12px; cursor:pointer; border:1px solid; }
  .modal-btn.primary { background:var(--accent); color:#000; border-color:var(--accent); }
  .modal-btn.ghost { background:transparent; color:var(--muted); border-color:var(--dim); }
  .toast { position:fixed; bottom:calc(70px + var(--safe-bottom)); left:50%; transform:translateX(-50%) translateY(20px); background:var(--accent); color:#000; font-family:'Barlow Condensed',sans-serif; font-size:13px; font-weight:700; letter-spacing:3px; text-transform:uppercase; padding:10px 20px; opacity:0; transition:all 0.3s; z-index:300; white-space:nowrap; }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
  .bottom-nav { position:fixed; bottom:0; left:0; right:0; background:rgba(10,10,10,0.97); border-top:1px solid var(--border); display:flex; padding-bottom:var(--safe-bottom); z-index:100; }
  .nav-btn { flex:1; background:transparent; border:none; color:var(--muted); font-family:'Barlow Condensed',sans-serif; font-size:10px; font-weight:700; letter-spacing:2px; text-transform:uppercase; padding:10px 4px 8px; cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:4px; }
  .nav-btn .nav-icon { font-size:20px; }
  .nav-btn.active { color:var(--accent); }
</style>
</head>
<body>
<div class="app-header">
  <div class="logo">MIX<span>LAB</span></div>
  <div class="header-actions">
    <button class="icon-btn" onclick="openSaveModal()">💾</button>
    <button class="icon-btn" onclick="clearAll()">🗑</button>
  </div>
</div>
<div class="page active" id="page-calc">
  <div class="target-bar">
    <div class="target-row">
      <span class="target-lbl">TARGET</span>
      <input class="target-input" type="number" id="targetMl" value="100" min="1" inputmode="numeric">
      <span class="ml-lbl">ML</span>
    </div>
    <div class="quick-btns">
      <button class="qbtn" onclick="setTarget(10)">10</button>
      <button class="qbtn" onclick="setTarget(30)">30</button>
      <button class="qbtn active" onclick="setTarget(100)">100</button>
      <button class="qbtn" onclick="setTarget(250)">250</button>
      <button class="qbtn" onclick="setTarget(500)">500</button>
      <button class="qbtn" onclick="setTarget(1000)">1L</button>
    </div>
  </div>
  <div class="ratio-card">
    <div class="ratio-top">
      <span class="ratio-lbl">RATIO</span>
      <div class="ratio-inputs">
        <input class="ratio-num" type="number" id="vgRatio" value="70" min="0" max="100" inputmode="numeric" oninput="onVgChange()">
        <span class="ratio-sep">/</span>
        <input class="ratio-num" type="number" id="pgRatio" value="30" min="0" max="100" inputmode="numeric" oninput="onPgChange()">
      </div>
      <span class="ratio-tag">VG / PG</span>
    </div>
    <div class="ratio-results">
      <div class="rrbox vg">
        <div class="rrbox-lbl">Add VG</div>
        <div class="rrbox-val vg" id="vgAddVal">—</div>
        <div class="rrbox-sub" id="vgAddSub"></div>
      </div>
      <div class="rrbox pg">
        <div class="rrbox-lbl">Add PG</div>
        <div class="rrbox-val pg" id="pgAddVal">—</div>
        <div class="rrbox-sub" id="pgAddSub"></div>
      </div>
    </div>
  </div>
  <div class="section-hdr">
    <div class="section-lbl">Flavour Concentrates</div>
    <div style="font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--dim)" id="flavNote"></div>
  </div>
  <div class="col-hdrs">
    <div class="col-h">Ingredient</div>
    <div class="col-h r">%</div>
    <div class="col-h r">ml</div>
    <div class="col-h c" style="font-size:8px;">Base</div>
    <div class="col-h"></div>
  </div>
  <div id="ingList"></div>
  <button class="add-btn" onclick="addIng()">+ Add Ingredient</button>
  <div class="section-hdr" style="margin-top:18px;">
    <div class="section-lbl">Nicotine</div>
  </div>
  <div class="nic-card">
    <div class="nic-base-row">
      <span class="nic-base-lbl">Nic base is</span>
      <div class="nic-base-btns">
        <button class="nbb sel-vg" id="nbb-vg" onclick="setNicBase('vg')">VG</button>
        <button class="nbb" id="nbb-5050" onclick="setNicBase('5050')">50/50</button>
        <button class="nbb" id="nbb-pg" onclick="setNicBase('pg')">PG</button>
      </div>
    </div>
    <div class="nic-grid">
      <div class="nic-field">
        <label>Base Strength</label>
        <input type="number" id="nicBaseVal" placeholder="72" inputmode="decimal" oninput="calc()">
        <div class="nic-unit">mg/ml</div>
      </div>
      <div class="nic-field">
        <label>Target Strength</label>
        <input type="number" id="nicTargetVal" placeholder="3" inputmode="decimal" oninput="calc()">
        <div class="nic-unit">mg/ml</div>
      </div>
    </div>
    <div class="nic-result-row">
      <div class="nic-res-lbl">Required Nic</div>
      <div><span class="nic-res-val" id="nicRes">—</span><span style="font-size:13px;color:var(--muted);margin-left:4px;">ml</span></div>
    </div>
  </div>
  <div class="totals-card">
    <div class="totals-row">
      <div class="tot-item">
        <div class="tot-val" id="totPct">0%</div>
        <div class="tot-lbl">Total Used</div>
      </div>
      <div style="flex:1;padding:0 14px 0 20px;">
        <div class="fill-track">
          <div class="fill-seg flav" id="segFlav" style="width:0%"></div>
          <div class="fill-seg nic"  id="segNic"  style="width:0%"></div>
          <div class="fill-seg vg"   id="segVg"   style="width:0%"></div>
          <div class="fill-seg pg"   id="segPg"   style="width:0%"></div>
        </div>
        <div class="fill-legend">
          <div class="fill-leg-item"><div class="fill-leg-dot" style="background:var(--accent2)"></div><span id="legFlav">Flav 0%</span></div>
          <div class="fill-leg-item"><div class="fill-leg-dot" style="background:var(--purple)"></div><span id="legNic">Nic 0%</span></div>
          <div class="fill-leg-item"><div class="fill-leg-dot" style="background:var(--vg)"></div><span id="legVg">VG 0%</span></div>
          <div class="fill-leg-item"><div class="fill-leg-dot" style="background:var(--pg)"></div><span id="legPg">PG 0%</span></div>
        </div>
      </div>
    </div>
    <div class="totals-bottom">
      <div class="tot-lbl">Total batch volume</div>
      <div class="tot-ml" id="totMl">0 ml</div>
    </div>
  </div>
</div>
<div class="page" id="page-recipes">
  <div class="section-hdr" style="margin-top:8px;">
    <div class="section-lbl">Saved Recipes</div>
    <div id="recipeCount" style="font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--dim)">0 / 500</div>
  </div>
  <input class="recipe-search" type="text" id="recipeSearch" placeholder="Search recipes..." oninput="renderRecipes()">
  <div id="recipeList"></div>
</div>
<div class="bottom-nav">
  <button class="nav-btn active" id="nav-calc" onclick="showPage('calc')"><span class="nav-icon">⚗️</span><span>CALC</span></button>
  <button class="nav-btn" id="nav-recipes" onclick="showPage('recipes')"><span class="nav-icon">📋</span><span>RECIPES</span></button>
</div>
<div class="modal-overlay" id="saveModal">
  <div class="modal">
    <div class="modal-title">Save Recipe</div>
    <input class="modal-input" type="text" id="recipeName" placeholder="e.g. Strawberry Custard" maxlength="50">
    <div class="modal-btns">
      <button class="modal-btn ghost" onclick="closeSaveModal()">CANCEL</button>
      <button class="modal-btn primary" onclick="saveRecipe()">SAVE</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
let ings=[], idCtr=0, nicBaseType='vg';
let recipes=JSON.parse(localStorage.getItem('mixlab_v2_recipes')||'[]');

function showPage(name){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  document.getElementById('nav-'+name).classList.add('active');
  if(name==='recipes')renderRecipes();
}
function setTarget(v){
  document.getElementById('targetMl').value=v;
  document.querySelectorAll('.qbtn').forEach(b=>b.classList.toggle('active',v===1000?b.textContent==='1L':b.textContent==v));
  renderIngs(); calc();
}
function onVgChange(){
  const vg=Math.min(100,Math.max(0,parseFloat(document.getElementById('vgRatio').value)||0));
  document.getElementById('pgRatio').value=100-vg; calc();
}
function onPgChange(){
  const pg=Math.min(100,Math.max(0,parseFloat(document.getElementById('pgRatio').value)||0));
  document.getElementById('vgRatio').value=100-pg; calc();
}
function setNicBase(type){
  nicBaseType=type;
  document.getElementById('nbb-vg').className='nbb'+(type==='vg'?' sel-vg':'');
  document.getElementById('nbb-5050').className='nbb'+(type==='5050'?' sel-5050':'');
  document.getElementById('nbb-pg').className='nbb'+(type==='pg'?' sel-pg':'');
  calc();
}
function addIng(name='',pct='',vgpg='pg'){
  ings.push({id:idCtr++,name,pct,vgpg}); renderIngs(); calc();
}
function removeIng(id){
  ings=ings.filter(i=>i.id!==id); renderIngs(); calc();
}
function updateIng(id,field,val){
  const i=ings.find(x=>x.id===id); if(i){i[field]=val;calc();}
}
function toggleVgPg(id){
  const i=ings.find(x=>x.id===id); if(!i)return;
  i.vgpg=i.vgpg==='pg'?'vg':'pg'; renderIngs(); calc();
}
function renderIngs(){
  const list=document.getElementById('ingList');
  const target=parseFloat(document.getElementById('targetMl').value)||0;
  list.innerHTML='';
  ings.forEach(ing=>{
    const isVg=ing.vgpg==='vg';
    const ml=((parseFloat(ing.pct)||0)/100)*target;
    const row=document.createElement('div');
    row.className='ing-row';
    row.innerHTML=`
      <input class="ing-name" type="text" placeholder="Flavour name" value="${esc(ing.name)}" oninput="updateIng(${ing.id},'name',this.value)">
      <input class="ing-pct" type="number" placeholder="0" value="${ing.pct}" inputmode="decimal" min="0" max="100" oninput="updateIng(${ing.id},'pct',this.value)">
      <div class="ing-ml" id="ml_${ing.id}">${ml>0?ml.toFixed(2):'—'}</div>
      <div class="ing-vgpg" onclick="toggleVgPg(${ing.id})">
        <div class="vgpg-half ${isVg?'sel-vg':''}">VG</div>
        <div class="vgpg-half ${!isVg?'sel-pg':''}">PG</div>
      </div>
      <button class="ing-del" onclick="removeIng(${ing.id})">×</button>
    `;
    list.appendChild(row);
  });
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function calc(){
  const target=parseFloat(document.getElementById('targetMl').value)||0;
  const vgRatio=parseFloat(document.getElementById('vgRatio').value)||0;
  const pgRatio=parseFloat(document.getElementById('pgRatio').value)||0;

  // Flavours
  let flavPct=0,flavVg=0,flavPg=0;
  ings.forEach(ing=>{
    const pct=parseFloat(ing.pct)||0;
    const ml=(pct/100)*target;
    flavPct+=pct;
    if(ing.vgpg==='vg')flavVg+=ml; else flavPg+=ml;
    const el=document.getElementById('ml_'+ing.id);
    if(el)el.textContent=ml>0?ml.toFixed(2):'—';
  });

  // Nic
  const nbv=parseFloat(document.getElementById('nicBaseVal').value)||0;
  const ntv=parseFloat(document.getElementById('nicTargetVal').value)||0;
  let nicMl=0,nicVg=0,nicPg=0,nicPct=0;
  if(nbv>0&&ntv>0&&target>0){
    nicMl=(ntv*target)/nbv; nicPct=(nicMl/target)*100;
    if(nicBaseType==='vg')nicVg=nicMl;
    else if(nicBaseType==='pg')nicPg=nicMl;
    else{nicVg=nicMl/2;nicPg=nicMl/2;}
  }
  document.getElementById('nicRes').textContent=nicMl>0?nicMl.toFixed(2):'—';

  // VG/PG to add
  const targetVg=(vgRatio/100)*target;
  const targetPg=(pgRatio/100)*target;
  const addVg=Math.max(0,targetVg-flavVg-nicVg);
  const addPg=Math.max(0,targetPg-flavPg-nicPg);
  const addVgPct=target>0?(addVg/target)*100:0;
  const addPgPct=target>0?(addPg/target)*100:0;

  document.getElementById('vgAddVal').textContent=addVg.toFixed(2)+' ml';
  document.getElementById('pgAddVal').textContent=addPg.toFixed(2)+' ml';
  document.getElementById('vgAddSub').textContent=`target ${targetVg.toFixed(1)} − used ${(flavVg+nicVg).toFixed(1)}`;
  document.getElementById('pgAddSub').textContent=`target ${targetPg.toFixed(1)} − used ${(flavPg+nicPg).toFixed(1)}`;

  // Total % — all 4 components
  const totalPct=flavPct+nicPct+addVgPct+addPgPct;
  const isOver=totalPct>101;
  const isClose=totalPct>98&&!isOver;
  const totalMl=flavVg+flavPg+nicMl+addVg+addPg;

  // Segmented bar — each segment as % of total
  document.getElementById('segFlav').style.width=Math.min(100,flavPct).toFixed(1)+'%';
  document.getElementById('segNic').style.width=Math.min(100,nicPct).toFixed(1)+'%';
  document.getElementById('segVg').style.width=Math.min(100,addVgPct).toFixed(1)+'%';
  document.getElementById('segPg').style.width=Math.min(100,addPgPct).toFixed(1)+'%';

  // Legends
  document.getElementById('legFlav').textContent='Flav '+flavPct.toFixed(1)+'%';
  document.getElementById('legNic').textContent='Nic '+nicPct.toFixed(1)+'%';
  document.getElementById('legVg').textContent='VG '+addVgPct.toFixed(1)+'%';
  document.getElementById('legPg').textContent='PG '+addPgPct.toFixed(1)+'%';

  document.getElementById('totPct').textContent=totalPct.toFixed(1)+'%';
  document.getElementById('totPct').className='tot-val'+(isOver?' over':isClose?' close':'');
  document.getElementById('totMl').textContent=totalMl.toFixed(2)+' ml';
  document.getElementById('flavNote').textContent=ings.length+' ingredient'+(ings.length!==1?'s':'')+' · '+flavPct.toFixed(1)+'%';
}

function clearAll(){
  ings=[];
  document.getElementById('nicBaseVal').value='';
  document.getElementById('nicTargetVal').value='';
  renderIngs(); calc(); showToast('CLEARED');
}
function openSaveModal(){
  document.getElementById('recipeName').value='';
  document.getElementById('saveModal').classList.add('open');
  setTimeout(()=>document.getElementById('recipeName').focus(),100);
}
function closeSaveModal(){document.getElementById('saveModal').classList.remove('open');}
function saveRecipe(){
  const name=document.getElementById('recipeName').value.trim();
  if(!name){showToast('ENTER A NAME');return;}
  if(recipes.length>=500){showToast('MAX 500 RECIPES');return;}
  recipes.push({
    id:Date.now(), name,
    targetMl:document.getElementById('targetMl').value,
    vgRatio:document.getElementById('vgRatio').value,
    pgRatio:document.getElementById('pgRatio').value,
    nicBaseType, nicBase:document.getElementById('nicBaseVal').value,
    nicTarget:document.getElementById('nicTargetVal').value,
    ings:ings.map(i=>({name:i.name,pct:i.pct,vgpg:i.vgpg})),
    saved:new Date().toLocaleDateString()
  });
  localStorage.setItem('mixlab_v2_recipes',JSON.stringify(recipes));
  closeSaveModal(); showToast('SAVED!');
}
function loadRecipe(id){
  const r=recipes.find(x=>x.id===id); if(!r)return;
  document.getElementById('targetMl').value=r.targetMl||100;
  document.getElementById('vgRatio').value=r.vgRatio||70;
  document.getElementById('pgRatio').value=r.pgRatio||30;
  document.getElementById('nicBaseVal').value=r.nicBase||'';
  document.getElementById('nicTargetVal').value=r.nicTarget||'';
  setNicBase(r.nicBaseType||'vg');
  ings=(r.ings||[]).map(i=>({id:idCtr++,name:i.name,pct:i.pct,vgpg:i.vgpg||'pg'}));
  renderIngs(); calc(); showPage('calc'); showToast('LOADED!');
}
function deleteRecipe(id){
  if(!confirm('Delete this recipe?'))return;
  recipes=recipes.filter(r=>r.id!==id);
  localStorage.setItem('mixlab_v2_recipes',JSON.stringify(recipes));
  renderRecipes(); showToast('DELETED');
}
function renderRecipes(){
  const list=document.getElementById('recipeList');
  const q=(document.getElementById('recipeSearch').value||'').toLowerCase();
  const filtered=recipes.filter(r=>r.name.toLowerCase().includes(q));
  document.getElementById('recipeCount').textContent=recipes.length+' / 500';
  if(filtered.length===0){
    list.innerHTML=`<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-txt">${recipes.length===0?'No saved recipes yet':'No results found'}</div></div>`;
    return;
  }
  list.innerHTML='';
  [...filtered].reverse().forEach(r=>{
    const n=(r.ings||[]).filter(i=>i.name).length;
    const card=document.createElement('div');
    card.className='recipe-card';
    card.innerHTML=`
      <div class="recipe-name">${esc(r.name)}</div>
      <div class="recipe-meta">${r.targetMl}ml · ${r.vgRatio||70}/${r.pgRatio||30} VG/PG · ${n} flavour${n!==1?'s':''} · ${r.saved}</div>
      <button class="recipe-del" onclick="event.stopPropagation();deleteRecipe(${r.id})">×</button>
    `;
    card.addEventListener('click',()=>loadRecipe(r.id));
    list.appendChild(card);
  });
}
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}
if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});
document.getElementById('targetMl').addEventListener('input',()=>{renderIngs();calc();});
addIng('','','pg'); addIng('','','pg'); addIng('','','pg');
calc();
</script>
</body>
</html>
