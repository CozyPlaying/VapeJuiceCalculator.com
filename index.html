<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#e8ff47">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MIXLAB">
<title>MIXLAB</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111;
    --card: #161616;
    --border: #2a2a2a;
    --accent: #e8ff47;
    --accent2: #ff6b35;
    --purple: #9b59b6;
    --text: #f0f0f0;
    --muted: #666;
    --dim: #333;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    overscroll-behavior: none;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow Condensed', sans-serif;
    padding-top: var(--safe-top);
    padding-bottom: calc(60px + var(--safe-bottom));
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 40px, rgba(255,255,255,0.012) 40px, rgba(255,255,255,0.012) 41px),
      repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(255,255,255,0.012) 40px, rgba(255,255,255,0.012) 41px);
  }

  /* ── HEADER ── */
  .app-header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(10,10,10,0.95);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo { font-size: 28px; font-weight: 900; letter-spacing: 6px; color: var(--accent); text-shadow: 0 0 20px rgba(232,255,71,0.3); }
  .logo span { color: var(--text); }

  .header-actions { display: flex; gap: 8px; }

  .icon-btn {
    background: transparent;
    border: 1px solid var(--dim);
    color: var(--muted);
    font-size: 16px;
    width: 36px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.15s;
  }
  .icon-btn:active { background: var(--dim); }

  /* ── TABS ── */
  .tab-bar {
    display: flex;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky;
    top: 57px;
    z-index: 99;
  }

  .tab {
    flex: 1;
    padding: 12px 8px;
    text-align: center;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
  }

  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* ── PAGES ── */
  .page { display: none; padding: 12px 12px 20px; }
  .page.active { display: block; }

  /* ── TARGET BAR ── */
  .target-bar {
    background: var(--card);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    padding: 12px 16px;
    margin-bottom: 12px;
  }

  .target-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }

  .target-lbl { font-size: 11px; font-weight: 700; letter-spacing: 3px; color: var(--accent); }

  .target-input {
    background: var(--bg);
    border: 1px solid var(--dim);
    color: var(--accent);
    font-family: 'Share Tech Mono', monospace;
    font-size: 28px;
    width: 100px;
    padding: 6px 10px;
    text-align: center;
    outline: none;
    border-radius: 0;
  }

  .target-input:focus { border-color: var(--accent); }

  .ml-lbl { font-size: 16px; color: var(--muted); }

  .quick-btns { display: flex; gap: 6px; flex-wrap: wrap; }

  .qbtn {
    background: transparent;
    border: 1px solid var(--dim);
    color: var(--muted);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 1px;
    padding: 7px 14px;
    cursor: pointer;
    transition: all 0.15s;
    border-radius: 0;
  }

  .qbtn:active, .qbtn.active { border-color: var(--accent); color: var(--accent); background: rgba(232,255,71,0.08); }

  /* ── SECTION LABELS ── */
  .section-hdr {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin: 16px 0 8px;
  }

  .section-lbl { font-size: 10px; font-weight: 700; letter-spacing: 4px; color: var(--muted); text-transform: uppercase; }

  .unit-toggle { display: flex; }

  .utbtn {
    background: transparent;
    border: 1px solid var(--dim);
    color: var(--muted);
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    padding: 4px 10px;
    cursor: pointer;
    margin-left: -1px;
  }

  .utbtn.active { background: var(--accent); color: #000; border-color: var(--accent); position: relative; z-index: 1; }

  /* ── INGREDIENT ROWS ── */
  .ing-row {
    background: var(--card);
    border: 1px solid var(--border);
    display: grid;
    grid-template-columns: 1fr 80px 80px 38px;
    margin-bottom: 3px;
    animation: slideIn 0.2s ease;
  }

  @keyframes slideIn { from { opacity: 0; transform: translateX(-8px); } to { opacity: 1; transform: none; } }

  .ing-name {
    background: transparent;
    border: none;
    border-right: 1px solid var(--border);
    color: var(--text);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 15px;
    padding: 11px 12px;
    outline: none;
    width: 100%;
  }

  .ing-name::placeholder { color: var(--dim); }

  .ing-amt {
    background: transparent;
    border: none;
    border-right: 1px solid var(--border);
    color: var(--accent2);
    font-family: 'Share Tech Mono', monospace;
    font-size: 15px;
    padding: 11px 10px;
    outline: none;
    width: 100%;
    text-align: right;
  }

  .ing-res {
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    color: var(--accent);
    padding: 11px 10px;
    text-align: right;
    border-right: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: flex-end;
  }

  .ing-del {
    background: transparent;
    border: none;
    color: var(--dim);
    font-size: 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .ing-del:active { color: #ff4444; }

  .col-hdrs {
    display: grid;
    grid-template-columns: 1fr 80px 80px 38px;
    margin-bottom: 4px;
  }

  .col-h { font-size: 9px; letter-spacing: 2px; color: var(--dim); text-transform: uppercase; padding: 0 12px; }
  .col-h.r { text-align: right; padding-right: 10px; }

  /* ── ADD BTN ── */
  .add-btn {
    width: 100%;
    background: transparent;
    border: 1px dashed var(--dim);
    color: var(--muted);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    padding: 12px;
    cursor: pointer;
    margin-top: 6px;
    transition: all 0.15s;
  }

  .add-btn:active { border-color: var(--accent); color: var(--accent); }

  /* ── SPECIAL ROWS ── */
  .special-row {
    background: var(--card);
    border: 1px solid var(--border);
    border-left: 2px solid var(--accent2);
    display: grid;
    grid-template-columns: 70px 1fr 90px;
    margin-bottom: 3px;
    align-items: center;
  }

  .sp-lbl {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--muted);
    padding: 11px 12px;
    border-right: 1px solid var(--border);
    text-transform: uppercase;
  }

  /* ── NIC SECTION ── */
  .nic-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-left: 2px solid var(--purple);
    padding: 14px;
    margin-top: 4px;
  }

  .nic-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }

  .nic-field label {
    display: block;
    font-size: 9px;
    letter-spacing: 3px;
    color: var(--muted);
    margin-bottom: 5px;
    text-transform: uppercase;
  }

  .nic-field input {
    background: var(--bg);
    border: 1px solid var(--dim);
    color: #c39bd3;
    font-family: 'Share Tech Mono', monospace;
    font-size: 22px;
    padding: 8px 10px;
    outline: none;
    width: 100%;
    border-radius: 0;
  }

  .nic-field input:focus { border-color: var(--purple); }

  .nic-result-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-top: 8px;
    border-top: 1px solid var(--border);
  }

  .nic-res-lbl { font-size: 10px; letter-spacing: 3px; color: var(--muted); text-transform: uppercase; }

  .nic-res-val {
    font-family: 'Share Tech Mono', monospace;
    font-size: 24px;
    color: var(--purple);
  }

  /* ── TOTALS ── */
  .totals-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-top: 2px solid var(--accent);
    padding: 14px 16px;
    margin-top: 16px;
  }

  .totals-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }

  .tot-item { text-align: center; }

  .tot-val {
    font-family: 'Share Tech Mono', monospace;
    font-size: 26px;
    color: var(--accent);
    line-height: 1;
  }

  .tot-val.over { color: #ff4444; }
  .tot-val.close { color: var(--accent2); }

  .tot-lbl { font-size: 9px; letter-spacing: 2px; color: var(--muted); margin-top: 3px; text-transform: uppercase; }

  .fill-track { height: 5px; background: var(--dim); }
  .fill-fill { height: 100%; background: var(--accent); transition: width 0.3s, background 0.3s; }
  .fill-fill.over { background: #ff4444; }
  .fill-fill.close { background: var(--accent2); }

  /* ── RECIPES PAGE ── */
  .recipe-card {
    background: var(--card);
    border: 1px solid var(--border);
    padding: 14px 16px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: border-color 0.15s;
    position: relative;
  }

  .recipe-card:active { border-color: var(--accent); }

  .recipe-name { font-size: 18px; font-weight: 700; letter-spacing: 2px; margin-bottom: 4px; }

  .recipe-meta { font-family: 'Share Tech Mono', monospace; font-size: 11px; color: var(--muted); }

  .recipe-del {
    position: absolute;
    top: 12px; right: 12px;
    background: transparent;
    border: none;
    color: var(--dim);
    font-size: 18px;
    cursor: pointer;
    padding: 4px 8px;
  }

  .recipe-del:active { color: #ff4444; }

  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
  }

  .empty-state div:first-child { font-size: 40px; margin-bottom: 12px; }
  .empty-state div:last-child { font-size: 12px; letter-spacing: 3px; text-transform: uppercase; }

  /* ── SAVE MODAL ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--card);
    border: 1px solid var(--border);
    border-top: 2px solid var(--accent);
    padding: 24px;
    width: 100%;
    max-width: 360px;
  }

  .modal-title { font-size: 16px; font-weight: 700; letter-spacing: 3px; color: var(--accent); margin-bottom: 16px; text-transform: uppercase; }

  .modal-input {
    background: var(--bg);
    border: 1px solid var(--dim);
    color: var(--text);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 20px;
    padding: 10px 14px;
    width: 100%;
    outline: none;
    margin-bottom: 16px;
    border-radius: 0;
  }

  .modal-input:focus { border-color: var(--accent); }

  .modal-btns { display: flex; gap: 8px; }

  .modal-btn {
    flex: 1;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    padding: 12px;
    cursor: pointer;
    border: 1px solid;
    border-radius: 0;
  }

  .modal-btn.primary { background: var(--accent); color: #000; border-color: var(--accent); }
  .modal-btn.ghost { background: transparent; color: var(--muted); border-color: var(--dim); }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: calc(70px + var(--safe-bottom));
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--accent);
    color: #000;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    padding: 10px 20px;
    opacity: 0;
    transition: all 0.3s;
    z-index: 300;
    white-space: nowrap;
  }

  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── BOTTOM NAV ── */
  .bottom-nav {
    position: fixed;
    bottom: 0;
    left: 0; right: 0;
    background: rgba(10,10,10,0.97);
    border-top: 1px solid var(--border);
    display: flex;
    padding-bottom: var(--safe-bottom);
    z-index: 100;
  }

  .nav-btn {
    flex: 1;
    background: transparent;
    border: none;
    color: var(--muted);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 10px 4px 8px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    transition: color 0.15s;
  }

  .nav-btn .nav-icon { font-size: 20px; }
  .nav-btn.active { color: var(--accent); }
</style>
</head>
<body>

<div class="app-header">
  <div class="logo">MIX<span>LAB</span></div>
  <div class="header-actions">
    <button class="icon-btn" onclick="openSaveModal()" title="Save Recipe">💾</button>
    <button class="icon-btn" onclick="clearAll()" title="Clear">🗑</button>
  </div>
</div>

<!-- CALCULATOR PAGE -->
<div class="page active" id="page-calc">

  <!-- TARGET -->
  <div class="target-bar">
    <div class="target-row">
      <span class="target-lbl">TARGET</span>
      <input class="target-input" type="number" id="targetMl" value="100" min="1" inputmode="numeric">
      <span class="ml-lbl">ML</span>
    </div>
    <div class="quick-btns">
      <button class="qbtn" onclick="setTarget(10)">10</button>
      <button class="qbtn" onclick="setTarget(30)">30</button>
      <button class="qbtn active" onclick="setTarget(100)">100</button>
      <button class="qbtn" onclick="setTarget(250)">250</button>
      <button class="qbtn" onclick="setTarget(500)">500</button>
      <button class="qbtn" onclick="setTarget(1000)">1L</button>
    </div>
  </div>

  <!-- FLAVOURS -->
  <div class="section-hdr">
    <div class="section-lbl">Flavour Concentrates</div>
    <div class="unit-toggle">
      <button class="utbtn active" id="uPct" onclick="setUnit('pct')">%</button>
      <button class="utbtn" id="uMl" onclick="setUnit('ml')">ml</button>
    </div>
  </div>

  <div class="col-hdrs">
    <div class="col-h">Ingredient</div>
    <div class="col-h r" id="colBase">Base %</div>
    <div class="col-h r">Result</div>
    <div class="col-h"></div>
  </div>

  <div id="ingList"></div>
  <button class="add-btn" onclick="addIng()">+ Add Ingredient</button>

  <!-- VG / PG -->
  <div class="section-hdr" style="margin-top:20px;">
    <div class="section-lbl">Base — VG / PG</div>
    <div id="vgpgNote" style="font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--dim)"></div>
  </div>

  <div class="special-row">
    <div class="sp-lbl">VG</div>
    <input class="ing-amt" type="number" id="vgPct" placeholder="70" min="0" max="100" inputmode="decimal" oninput="calc()">
    <div class="ing-res" id="vgRes">—</div>
  </div>
  <div class="special-row">
    <div class="sp-lbl">PG</div>
    <input class="ing-amt" type="number" id="pgPct" placeholder="30" min="0" max="100" inputmode="decimal" oninput="calc()">
    <div class="ing-res" id="pgRes">—</div>
  </div>

  <!-- NIC -->
  <div class="section-hdr" style="margin-top:20px;">
    <div class="section-lbl">Nicotine</div>
  </div>

  <div class="nic-card">
    <div class="nic-grid">
      <div class="nic-field">
        <label>Base Strength</label>
        <input type="number" id="nicBase" placeholder="72" inputmode="decimal" oninput="calc()">
        <div style="font-size:9px;color:var(--dim);margin-top:3px;letter-spacing:1px;">mg/ml</div>
      </div>
      <div class="nic-field">
        <label>Target Strength</label>
        <input type="number" id="nicTarget" placeholder="3" inputmode="decimal" oninput="calc()">
        <div style="font-size:9px;color:var(--dim);margin-top:3px;letter-spacing:1px;">mg/ml</div>
      </div>
    </div>
    <div class="nic-result-row">
      <div class="nic-res-lbl">Required Nic</div>
      <div>
        <span class="nic-res-val" id="nicRes">—</span>
        <span style="font-size:13px;color:var(--muted);margin-left:4px;">ml</span>
      </div>
    </div>
  </div>

  <!-- TOTALS -->
  <div class="totals-card">
    <div class="totals-row">
      <div class="tot-item">
        <div class="tot-val" id="totPct">0%</div>
        <div class="tot-lbl">Used</div>
      </div>
      <div style="flex:1;padding:0 14px;">
        <div class="fill-track">
          <div class="fill-fill" id="fillBar" style="width:0%"></div>
        </div>
      </div>
      <div class="tot-item">
        <div class="tot-val" id="remPct">100%</div>
        <div class="tot-lbl">Remain</div>
      </div>
    </div>
    <div style="border-top:1px solid var(--border);padding-top:10px;display:flex;justify-content:space-between;align-items:center;">
      <div class="tot-lbl">Total mix volume</div>
      <div style="font-family:'Share Tech Mono',monospace;font-size:20px;color:var(--accent);" id="totMl">0 ml</div>
    </div>
  </div>

</div>

<!-- RECIPES PAGE -->
<div class="page" id="page-recipes">
  <div class="section-hdr" style="margin-top:8px;">
    <div class="section-lbl">Saved Recipes</div>
    <div id="recipeCount" style="font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--dim);">0 / 10</div>
  </div>
  <div id="recipeList"></div>
</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <button class="nav-btn active" id="nav-calc" onclick="showPage('calc')">
    <span class="nav-icon">⚗️</span>
    <span>CALC</span>
  </button>
  <button class="nav-btn" id="nav-recipes" onclick="showPage('recipes')">
    <span class="nav-icon">📋</span>
    <span>RECIPES</span>
  </button>
</div>

<!-- SAVE MODAL -->
<div class="modal-overlay" id="saveModal">
  <div class="modal">
    <div class="modal-title">Save Recipe</div>
    <input class="modal-input" type="text" id="recipeName" placeholder="e.g. Strawberry Custard" maxlength="30">
    <div class="modal-btns">
      <button class="modal-btn ghost" onclick="closeSaveModal()">CANCEL</button>
      <button class="modal-btn primary" onclick="saveRecipe()">SAVE</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ── STATE ──
let unit = 'pct';
let ings = [];
let idCounter = 0;
let recipes = JSON.parse(localStorage.getItem('mixlab_recipes') || '[]');

// ── PAGES ──
function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  document.getElementById('nav-' + name).classList.add('active');
  if (name === 'recipes') renderRecipes();
}

// ── UNIT ──
function setUnit(u) {
  unit = u;
  document.getElementById('uPct').classList.toggle('active', u === 'pct');
  document.getElementById('uMl').classList.toggle('active', u === 'ml');
  document.getElementById('colBase').textContent = u === 'pct' ? 'Base %' : 'Base ml';
  renderIngs();
  calc();
}

// ── TARGET ──
function setTarget(v) {
  document.getElementById('targetMl').value = v;
  document.querySelectorAll('.qbtn').forEach(b => {
    const match = v === 1000 ? b.textContent === '1L' : b.textContent == v;
    b.classList.toggle('active', match);
  });
  calc();
}

// ── INGREDIENTS ──
function addIng(name = '', amount = '') {
  ings.push({ id: idCounter++, name, amount });
  renderIngs();
  calc();
}

function removeIng(id) {
  ings = ings.filter(i => i.id !== id);
  renderIngs();
  calc();
}

function updateIng(id, field, val) {
  const i = ings.find(x => x.id === id);
  if (i) { i[field] = val; calc(); }
}

function renderIngs() {
  const list = document.getElementById('ingList');
  list.innerHTML = '';
  ings.forEach(ing => {
    const row = document.createElement('div');
    row.className = 'ing-row';
    row.innerHTML = `
      <input class="ing-name" type="text" placeholder="Flavour name" value="${escHtml(ing.name)}"
        oninput="updateIng(${ing.id},'name',this.value)">
      <input class="ing-amt" type="number" placeholder="0" value="${ing.amount}"
        inputmode="decimal" min="0" oninput="updateIng(${ing.id},'amount',this.value)">
      <div class="ing-res" id="r${ing.id}">—</div>
      <button class="ing-del" onclick="removeIng(${ing.id})">×</button>
    `;
    list.appendChild(row);
  });
}

function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── CALCULATE ──
function calc() {
  const target = parseFloat(document.getElementById('targetMl').value) || 0;
  let flavPct = 0, flavMl = 0;

  ings.forEach(ing => {
    const amt = parseFloat(ing.amount) || 0;
    let ml = 0, pct = 0;
    if (unit === 'pct') { pct = amt; ml = (amt / 100) * target; }
    else { ml = amt; pct = target > 0 ? (amt / target) * 100 : 0; }
    flavPct += pct; flavMl += ml;
    const el = document.getElementById('r' + ing.id);
    if (el) el.textContent = ml > 0 ? ml.toFixed(2) : '—';
  });

  // Nic
  const nicBase = parseFloat(document.getElementById('nicBase').value) || 0;
  const nicTgt = parseFloat(document.getElementById('nicTarget').value) || 0;
  let nicMl = 0, nicPct = 0;
  if (nicBase > 0 && nicTgt > 0 && target > 0) {
    nicMl = (nicTgt * target) / nicBase;
    nicPct = (nicMl / target) * 100;
  }
  document.getElementById('nicRes').textContent = nicMl > 0 ? nicMl.toFixed(2) : '—';

  // VG/PG
  const vgPct = parseFloat(document.getElementById('vgPct').value) || 0;
  const pgPct = parseFloat(document.getElementById('pgPct').value) || 0;
  const vgMl = (vgPct / 100) * target;
  const pgMl = (pgPct / 100) * target;
  document.getElementById('vgRes').textContent = vgMl > 0 ? vgMl.toFixed(2) + ' ml' : '—';
  document.getElementById('pgRes').textContent = pgMl > 0 ? pgMl.toFixed(2) + ' ml' : '—';

  const vgpgTotal = vgPct + pgPct;
  document.getElementById('vgpgNote').textContent = vgpgTotal > 0 ? `${vgPct}/${pgPct} = ${vgpgTotal.toFixed(0)}%` : '';

  // Totals
  const usedPct = flavPct + nicPct + vgPct + pgPct;
  const usedMl = flavMl + nicMl + vgMl + pgMl;
  const remPct = Math.max(0, 100 - usedPct);

  const isOver = usedPct > 100.5;
  const isClose = usedPct > 95 && !isOver;

  const totEl = document.getElementById('totPct');
  const fillEl = document.getElementById('fillBar');
  totEl.textContent = usedPct.toFixed(1) + '%';
  totEl.className = 'tot-val' + (isOver ? ' over' : isClose ? ' close' : '');
  document.getElementById('remPct').textContent = remPct.toFixed(1) + '%';
  document.getElementById('totMl').textContent = usedMl.toFixed(2) + ' ml';
  fillEl.style.width = Math.min(100, usedPct) + '%';
  fillEl.className = 'fill-fill' + (isOver ? ' over' : isClose ? ' close' : '');
}

// ── CLEAR ──
function clearAll() {
  ings = [];
  document.getElementById('vgPct').value = '';
  document.getElementById('pgPct').value = '';
  document.getElementById('nicBase').value = '';
  document.getElementById('nicTarget').value = '';
  renderIngs();
  calc();
  showToast('CLEARED');
}

// ── SAVE / LOAD RECIPES ──
function openSaveModal() {
  document.getElementById('recipeName').value = '';
  document.getElementById('saveModal').classList.add('open');
  setTimeout(() => document.getElementById('recipeName').focus(), 100);
}

function closeSaveModal() {
  document.getElementById('saveModal').classList.remove('open');
}

function saveRecipe() {
  const name = document.getElementById('recipeName').value.trim();
  if (!name) { showToast('ENTER A NAME'); return; }
  if (recipes.length >= 10) { showToast('MAX 10 RECIPES'); return; }

  const recipe = {
    id: Date.now(),
    name,
    targetMl: document.getElementById('targetMl').value,
    unit,
    ings: ings.map(i => ({ name: i.name, amount: i.amount })),
    vgPct: document.getElementById('vgPct').value,
    pgPct: document.getElementById('pgPct').value,
    nicBase: document.getElementById('nicBase').value,
    nicTarget: document.getElementById('nicTarget').value,
    saved: new Date().toLocaleDateString()
  };

  recipes.push(recipe);
  localStorage.setItem('mixlab_recipes', JSON.stringify(recipes));
  closeSaveModal();
  showToast('RECIPE SAVED');
}

function loadRecipe(id) {
  const r = recipes.find(x => x.id === id);
  if (!r) return;

  document.getElementById('targetMl').value = r.targetMl;
  setUnit(r.unit || 'pct');
  ings = r.ings.map(i => ({ id: idCounter++, name: i.name, amount: i.amount }));
  document.getElementById('vgPct').value = r.vgPct || '';
  document.getElementById('pgPct').value = r.pgPct || '';
  document.getElementById('nicBase').value = r.nicBase || '';
  document.getElementById('nicTarget').value = r.nicTarget || '';
  renderIngs();
  calc();
  showPage('calc');
  showToast('LOADED: ' + r.name.toUpperCase());
}

function deleteRecipe(id) {
  recipes = recipes.filter(r => r.id !== id);
  localStorage.setItem('mixlab_recipes', JSON.stringify(recipes));
  renderRecipes();
  showToast('DELETED');
}

function renderRecipes() {
  const list = document.getElementById('recipeList');
  document.getElementById('recipeCount').textContent = recipes.length + ' / 10';

  if (recipes.length === 0) {
    list.innerHTML = `<div class="empty-state"><div>📋</div><div>No saved recipes yet</div></div>`;
    return;
  }

  list.innerHTML = '';
  recipes.forEach(r => {
    const flavCount = (r.ings || []).filter(i => i.name).length;
    const card = document.createElement('div');
    card.className = 'recipe-card';
    card.innerHTML = `
      <div class="recipe-name">${escHtml(r.name)}</div>
      <div class="recipe-meta">${r.targetMl}ml · ${r.vgPct||'?'}/${r.pgPct||'?'} VG/PG · ${flavCount} flavour${flavCount!==1?'s':''} · ${r.saved}</div>
      <button class="recipe-del" onclick="event.stopPropagation();deleteRecipe(${r.id})">×</button>
    `;
    card.addEventListener('click', () => loadRecipe(r.id));
    list.appendChild(card);
  });
}

// ── TOAST ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ── SERVICE WORKER ──
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(console.error);
}

// ── INIT ──
document.getElementById('targetMl').addEventListener('input', calc);
addIng(); addIng(); addIng();
</script>
</body>
</html>
